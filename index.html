<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「布」可思議_布袋戲劇情遊戲</title>
    <style>
        .game-btn {
            background: #FFD700;
            /* 金色背景 */
            color: #333;
            /* 深灰文字 */
            border: 3px solid #fff;
            /* 白框 */
            border-radius: 50px;
            /* 圓角 */
            font-weight: bold;
            font-family: 'Microsoft JhengHei', sans-serif;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            /* 陰影 */
            transition: transform 0.1s, background 0.2s;
            /* 動畫 */

            /* 預設大小 (大按鈕) */
            font-size: 24px;
            padding: 15px 40px;
            margin: 5px;
            /* 避免按鈕黏在一起 */
        }

        /* 滑鼠移過去的效果 */
        .game-btn:hover {
            transform: scale(1.05);
            /* 稍微放大 */
            background: #ffea00;
            /* 變亮一點 */
        }

        /* 按下去的效果 */
        .game-btn:active {
            transform: scale(0.95);
            /* 稍微縮小 */
        }

        /* === 小按鈕變體 (給換裝選單用的) === */
        .game-btn.small {
            font-size: 16px;
            padding: 8px 20px;
            border-width: 2px;
        }

        /* === 儲存按鈕 (綠色變體) === */
        .game-btn.save {
            background: #28a745;
            color: white;
            width: 100%;
            /* 填滿寬度 */
        }

        .game-btn.save:hover {
            background: #34ce57;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        /* 視訊層 (最底) */
        .input_video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            transform: scaleX(-1);
            display: none;
            /* 預設隱藏，由 WorkshopScene 開啟 */
        }

        /* 遊戲層 (中) */
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: auto;
        }

        /* Three.js 層 (上) */
        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* === UI 面板樣式 (預設隱藏) === */
        #workshop-ui {
            display: none;
            pointer-events: auto;
        }

        .hud-group {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 15px;
            border-left: 4px solid #FFD700;
            z-index: 100;
            color: white;
            backdrop-filter: blur(4px);
            transition: 0.3s;
        }

        .hud-group:hover {
            transform: scale(1.05);
            background: rgba(0, 0, 0, 0.8);
        }

        .hud-group label {
            display: block;
            margin-bottom: 8px;
            color: #FFD700;
            font-weight: bold;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .circle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #888;
            background: #333;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .circle-btn:hover {
            background: #ba1f1f;
            border-color: #fff;
        }

        /* 位置設定 */
        #hud-head {
            top: 20%;
            left: 5%;
        }

        #hud-body {
            top: 50%;
            left: 5%;
        }

        #hud-hands {
            top: 35%;
            right: 5%;
            border-left: none;
            border-right: 4px solid #FFD700;
            text-align: right;
        }

        #hud-hands .btn-row {
            justify-content: flex-end;
        }

        #hud-main {
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            border: none;
            background: transparent;
        }

        #save-btn {
            padding: 12px 40px;
            font-size: 18px;
            background: linear-gradient(45deg, #ba1f1f, #800000);
            color: white;
            border: 2px solid #fff;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
    <script type="module" src="./src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

</head>

<body>
    <div id="game-container"></div>
    <video class="input_video" style="display:none"></video>

    <div id="workshop-ui">
        <img id="text-hand-title" src="assets/text_hand.png"
            style="position: absolute; left: 2%; top: 5%; width: 50%; max-width: 600px; z-index: 50; pointer-events: none;">

        <img id="instruction-guide" src="assets/guide.png"
            style="position: absolute; left: 2%; top: 58%; transform: translateY(-50%); width: 35%; max-width: 550px; z-index: 50; opacity: 0.9; pointer-events: none;">
        <div id="main-controls"
            style="position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); z-index: 100;">
            <button id="btn-open-workshop"
                style="font-size: 28px; padding: 15px 60px; border-radius: 50px; background: #FFD700; color: #333; border: 3px solid #fff; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.2s;">
                更換外觀
            </button>
        </div>

        <div id="customization-panel"
            style="display: none; position: absolute; top: 5%; right: 2%; width: 35%; height: 90%; background: rgba(20, 20, 20, 0.95); color: white; padding: 30px; z-index: 200; border-radius: 20px; border-left: 2px solid #FFD700; overflow-y: auto;">

            <h2
                style="text-align: center; color: #FFD700; margin-bottom: 30px; border-bottom: 1px solid #555; padding-bottom: 10px;">
                戲偶工作坊
            </h2>

            <div class="part-section" style="margin-bottom: 25px;">
                <h3 style="color: #ddd; margin-bottom: 10px;">更換頭部</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="changePart('Head', '01')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">頭部 01</button>
                    <button onclick="changePart('Head', '02')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">頭部 02</button>
                    <button onclick="changePart('Head', '03')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">頭部 03</button>
                    <button onclick="changePart('Head', '04')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">頭部 04</button>
                </div>
            </div>

            <div class="part-section" style="margin-bottom: 25px;">
                <h3 style="color: #ddd; margin-bottom: 10px;">更換身體</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="changePart('Body', '01')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">身體 01</button>
                    <button onclick="changePart('Body', '02')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">身體 02</button>
                    <button onclick="changePart('Body', '03')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">身體 03</button>
                    <button onclick="changePart('Body', '04')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">身體 04</button>
                </div>
            </div>

            <div class="part-section" style="margin-bottom: 40px;">
                <h3 style="color: #ddd; margin-bottom: 10px;">更換手部</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="changePart('Hand_L', '01'); changePart('Hand_R', '01')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
                        手部 01
                    </button>
                    <button onclick="changePart('Hand_L', '02'); changePart('Hand_R', '02')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
                        手部 02
                    </button>
                    <button onclick="changePart('Hand_L', '03'); changePart('Hand_R', '03')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
                        手部 03
                    </button>
                    <button onclick="changePart('Hand_L', '04'); changePart('Hand_R', '04')"
                        style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
                        手部 04
                    </button>
                </div>
            </div>
            <div
                style="margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; color: white; text-align: left;">
                <p style="margin: 0 0 10px 0; font-weight: bold; color: #FFD700;">🎮 操作靈敏度</p>

                <div style="margin-bottom: 10px;">
                    <label style="font-size: 14px;">轉身幅度</label>
                    <input type="range" min="1" max="8" step="0.5" value="3" style="width: 100%; cursor: pointer;"
                        oninput="setSensitivity('rotationSensitivity', this.value)">
                </div>

                <div>
                    <label style="font-size: 14px;">位移幅度</label>
                    <input type="range" min="5" max="30" step="1" value="15" style="width: 100%; cursor: pointer;"
                        oninput="setSensitivity('moveSensitivity', this.value)">
                </div>
                <div style="margin-top: 10px;">
                    <label style="font-size: 14px;">手臂擺動幅度</label>
                    <input type="range" min="0.5" max="3" step="0.1" value="1.5" style="width: 100%; cursor: pointer;"
                        oninput="setSensitivity('armSensitivity', this.value)">
                </div>

            </div>
            <div style="text-align: center; border-top: 1px solid #555; padding-top: 20px;">
                <button id="btn-save"
                    style="width: 100%; font-size: 22px; padding: 15px; background-color: #ba1f1f; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">
                    儲存並返回
                </button>
            </div>
        </div>
    </div>
</body>

</html>
